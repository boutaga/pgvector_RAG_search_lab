# =============================================================================
# Lab 07 — Security Observability Demo
#   PostgreSQL 18 + pgvector + pgaudit + postgresql_anonymizer
#   Standalone instance on port 5436, database: secobs
# =============================================================================

name: lab07-secobs

services:

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.pg18
    container_name: lab07_pg18
    shm_size: 1g
    environment:
      POSTGRES_DB: secobs
      POSTGRES_USER: dba_admin
      POSTGRES_PASSWORD: dbi2026!
    ports:
      - "5436:5432"
    volumes:
      - ../sql/init:/docker-entrypoint-initdb.d:ro
      - pgdata07:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_admin -d secobs"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pgaudit,anon"
      - "-c"
      - "pgaudit.log=read, write, ddl, role"
      - "-c"
      - "pgaudit.log_catalog=off"
      - "-c"
      - "pgaudit.log_parameter=on"
      - "-c"
      - "pgaudit.log_relation=on"
      - "-c"
      - "work_mem=128MB"
      - "-c"
      - "maintenance_work_mem=256MB"

volumes:
  pgdata07:
