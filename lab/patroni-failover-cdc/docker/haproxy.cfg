# Patroni leader-aware routing.
# The :5000 listener health-checks each node's Patroni REST API; only the
# current leader answers 200 to "OPTIONS /leader", so :5000 always points at
# the primary. On failover, on-marked-down drops sessions so the CDC consumer
# reconnects to the new leader. :5001 routes to replicas (read-only).
global
    maxconn 200

defaults
    log     global
    mode    tcp
    retries 2
    timeout client  30m
    timeout connect 5s
    timeout server  30m
    timeout check   5s

listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s

listen primary
    bind *:5000
    option httpchk OPTIONS /leader
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni1 patroni1:5432 maxconn 100 check port 8008
    server patroni2 patroni2:5432 maxconn 100 check port 8008

listen replica
    bind *:5001
    option httpchk OPTIONS /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    server patroni1 patroni1:5432 maxconn 100 check port 8008
    server patroni2 patroni2:5432 maxconn 100 check port 8008
