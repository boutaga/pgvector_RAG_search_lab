name: patroni-failover-slots

services:
  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.9}
    container_name: pfs-etcd
    hostname: etcd
    command:
      - etcd
      - --name=etcd0
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=pfs-etcd
    networks: [pfs-net]
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  patroni1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-18}
        PATRONI_VERSION: ${PATRONI_VERSION:-4.1.3}
    image: pfs-patroni:pg${PG_MAJOR:-18}
    container_name: pfs-patroni1
    hostname: patroni1
    environment:
      PATRONI_NAME: patroni1
      PATRONI_SCOPE: ${PATRONI_SCOPE:-cdc-demo}
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator}
      PG_MAJOR: ${PG_MAJOR:-18}
    ports:
      - "${PATRONI1_PG_PORT:-15432}:5432"
      - "${PATRONI1_API_PORT:-18008}:8008"
    networks: [pfs-net]
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - patroni1-data:/var/lib/postgresql/data

  patroni2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PG_MAJOR: ${PG_MAJOR:-18}
        PATRONI_VERSION: ${PATRONI_VERSION:-4.1.3}
    image: pfs-patroni:pg${PG_MAJOR:-18}
    container_name: pfs-patroni2
    hostname: patroni2
    environment:
      PATRONI_NAME: patroni2
      PATRONI_SCOPE: ${PATRONI_SCOPE:-cdc-demo}
      PATRONI_SUPERUSER_USERNAME: postgres
      PATRONI_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PATRONI_REPLICATION_USERNAME: replicator
      PATRONI_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-replicator}
      PG_MAJOR: ${PG_MAJOR:-18}
    ports:
      - "${PATRONI2_PG_PORT:-15433}:5432"
      - "${PATRONI2_API_PORT:-18009}:8008"
    networks: [pfs-net]
    depends_on:
      etcd:
        condition: service_healthy
    volumes:
      - patroni2-data:/var/lib/postgresql/data

  haproxy:
    image: ${HAPROXY_IMAGE:-haproxy:lts-alpine}
    container_name: pfs-haproxy
    hostname: haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "${HAPROXY_PRIMARY_PORT:-5000}:5000"
      - "${HAPROXY_REPLICA_PORT:-5001}:5001"
      - "${HAPROXY_STATS_PORT:-7000}:7000"
    networks: [pfs-net]
    depends_on:
      - patroni1
      - patroni2

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.8.1}
    container_name: pfs-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: pfs-kafka-cluster-0001
    networks: [pfs-net]

  connect:
    image: quay.io/debezium/connect:${DEBEZIUM_VERSION:-3.1}
    container_name: pfs-connect
    hostname: connect
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: pfs-connect
      CONFIG_STORAGE_TOPIC: pfs_connect_configs
      OFFSET_STORAGE_TOPIC: pfs_connect_offsets
      STATUS_STORAGE_TOPIC: pfs_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      # Flush offsets (and therefore advance the replication slot) every 10s
      # instead of the 60s default, so the synced failover slot reaches
      # "sync-ready" quickly and the demo is responsive.
      OFFSET_FLUSH_INTERVAL_MS: 10000
    ports:
      - "${CONNECT_PORT:-8083}:8083"
    networks: [pfs-net]
    depends_on:
      - kafka
      - haproxy

networks:
  pfs-net:
    driver: bridge

volumes:
  patroni1-data:
  patroni2-data:
